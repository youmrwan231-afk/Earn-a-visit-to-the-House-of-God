<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض الجزائر</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#f4f4f4;
  direction:rtl;
  text-align:center;
}

.header{
  background:#007a3d;
  color:#fff;
  padding:15px;
  font-weight:bold;
}

.container{
  max-width:420px;
  margin:20px auto;
  padding:20px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 0 10px #00000020;
}

h3{margin:5px 0}

.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#007a3d;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.wheel-container{
  position:relative;
  width:260px;
  height:260px;
  margin:20px auto;
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
}

canvas{
  border-radius:50%;
  border:5px solid #007a3d;
  transition:3s ease;
}

#network,#result,#steps{
  display:none;
}

.fake{
  font-size:12px;
  color:#888;
}

.box{
  background:#e6f4ea;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  color:#007a3d;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
📶 عرض خاص لمشتركي الجزائر 🇩🇿
</div>

<div class="container">

<h3>🎁 رصيد مجاني + انترنت</h3>

<!-- Spin -->
<div id="spinSection">
  <div class="wheel-container">
    <div class="pointer">▼</div>
    <canvas id="wheelCanvas" width="260" height="260"></canvas>
  </div>

  <button class="btn" onclick="spin()">شوف واش ربحت</button>
  <div class="fake">✔ اكثر من 120 واحد ربح اليوم</div>
</div>

<!-- Network -->
<div id="network">
  <h3>اختار الشبكة ديالك</h3>
  <button class="btn" onclick="next()">Mobilis</button>
  <button class="btn" onclick="next()">Djezzy</button>
  <button class="btn" onclick="next()">Ooredoo</button>
</div>

<!-- Result -->
<div id="result">
  <h3>🎉 مبروك!</h3>
  <div class="box">
    ربحت 3000 DA فليكسي + 1GB انترنت
  </div>
  <button class="btn" onclick="showSteps()">استلام الجائزة</button>
</div>

<!-- Steps -->
<div id="steps">
  <h3>📲 طريقة الاستلام</h3>
  <p>
  ادخل للعرض و دير تسجيل برقمك 📱<br><br>
  ومن بعد اكد الكود باش توصلك الجائزة مباشرة 🎁
  </p>

  <button class="btn" onclick="go()">الدخول للعرض</button>
</div>

</div>

<script>

const CPA_LINK = "https://leads.leadseagle.shop/?utm_medium=ce4978d0d6578edb7183a252c2bd29961e3c9e40&utm_campaign=DZ";

/* Wheel */
const rewards = ["0","500 DA","1GB","1000 DA","عرض","3000 DA"];
const colors = ["#f44336","#4caf50","#ffeb3b","#2196f3","#9c27b0","#2ecc71"];

const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");

const slices = rewards.length;
const angle = 2 * Math.PI / slices;

function drawWheel(){
  for(let i=0;i<slices;i++){
    ctx.beginPath();
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*angle,(i+1)*angle);
    ctx.fillStyle = colors[i];
    ctx.fill();

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*angle + angle/2);

    ctx.fillStyle="#000";
    ctx.font="bold 12px Arial";
    ctx.textAlign="center";
    ctx.fillText(rewards[i],80,0);

    ctx.restore();
  }
}
drawWheel();

/* Flow */
let spun=false;

function spin(){
  if(spun) return;
  spun=true;

  let deg = 3600 + (5 * (360 / slices));
  canvas.style.transform="rotate("+deg+"deg)";

  setTimeout(()=>{
    document.getElementById("spinSection").style.display="none";
    document.getElementById("network").style.display="block";
  },3000);
}

function next(){
  document.getElementById("network").style.display="none";
  document.getElementById("result").style.display="block";
}

function showSteps(){
  document.getElementById("result").style.display="none";
  document.getElementById("steps").style.display="block";
}

function go(){
  window.location.href = CPA_LINK;
}
</script>

</body>
</html>
